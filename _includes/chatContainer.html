<!-- Script -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const chatBtn = document.getElementById("chat-toggle");
  const closeBtn = document.getElementById("chatToggle");
  const chatBox = document.getElementById("chat-container");
  let isChatOpen = false;

  function openChat() {
    chatBox.classList.remove("hidden");
    gsap.fromTo(chatBox, 
      { opacity: 0, y: 100, scale: 0.95 },
      { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "back.out(1.7)" }
    );
    isChatOpen = true;
  }

  function closeChat() {
    gsap.to(chatBox, {
      opacity: 0, y: 100, scale: 0.95, duration: 0.3, ease: "power2.in",
      onComplete: () => chatBox.classList.add("hidden")
    });
    isChatOpen = false;
  }

  if (chatBtn) {
    chatBtn.addEventListener("click", () => isChatOpen ? closeChat() : openChat());
  }
  if (closeBtn) {
    closeBtn.addEventListener("click", closeChat);
  }
});
</script>

<script>
const BACK_URL = "https://api-ai.d-adityadwiputraramadhan.workers.dev/";

const chatContainer = document.querySelector("#chat-container");
const chatInput = chatContainer.querySelector("input[type='text']");
const chatMessages = chatContainer.querySelector(".overflow-y-auto");

function appendMessage(role, content, isLoading = false) {
  const wrapper = document.createElement("div");
  wrapper.className = `flex mb-4 ${role === "user" ? "justify-end" : "justify-start"}`;

  const bubble = document.createElement("div");
  bubble.className = `
    max-w-[80%] rounded-2xl p-4 shadow 
    ${role === "user"
      ? "bg-purple-600 text-white rounded-br-none"
      : "bg-white text-gray-800 rounded-bl-none"}
  `;

  if (isLoading) {
    bubble.innerHTML = `<span class="typing-dot animate-pulse">•••</span>`;
  } else {
    bubble.innerHTML = formatResponse(content);
  }

  wrapper.appendChild(bubble);
  chatMessages.appendChild(wrapper);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return bubble;
}

async function sendMessage(body) {
  
  appendMessage("user", body.prompt);

  const loaderBubble = appendMessage("assistant", "...", true);

  try {
    const modelName = body.model || "gemma2-9b-it";
    const promptText = body.prompt;

    const payload = {
      model: modelName,
      messages: [
        { role: "user", content: promptText }
      ],
    temperature: 0.2,
    max_completion_tokens: 512,
    };

    const res = await fetch(BACK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    const aiReply = data?.choices?.[0]?.message?.content || "⚠️ Tidak ada balasan.";

    loaderBubble.remove();
    appendMessage("assistant", formatResponse(aiReply));
  } catch (err) {
    console.error(err);
    loaderBubble.remove();
    appendMessage("assistant", "❌ Terjadi kesalahan. Silakan coba lagi.");
  }
}

function buildPrompt(userInput) {
  return `
Kamu adalah L Y Я A, asisten pribadi digital dari platform UI Transformer.

Berbicaralah dengan ramah dan profesional, bantu pengguna memahami fitur, menjawab pertanyaan, atau memberi semangat saat mereka bingung.

Format jawaban santai namun tetap informatif. Gunakan emoji bila sesuai.

User: "${userInput}"
  `.trim();
}

function formatResponse(text) {
  return DOMPurify.sanitize(marked.parse(text));
}

// ENTER untuk submit
chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && chatInput.value.trim()) {
    const promptText = chatInput.value.trim();
    chatInput.value = "";

    sendMessage({
      prompt: promptText,
      model: "gemma2-9b-it"
    });
  }
});
</script>
